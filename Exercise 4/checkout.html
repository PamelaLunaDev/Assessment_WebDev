<!DOCTYPE html> <!-- Declares the document type as HTML5 -->
<html lang="en"> <!-- Root element of the page. lang="en" defines the main language (important for accessibility). -->
<head> <!-- Contains metadata and configuration for the page -->
  <meta charset="UTF-8" /> <!-- Defines the character encoding. Allows special characters and accents to display correctly. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes the page responsive on mobile devices. -->
  <title>Checkout</title> <!-- Text shown in the browser tab. -->
  <link rel="stylesheet" href="style.css" /> <!-- Links this page to the external CSS file for styling. -->
</head>

<body> <!-- All visible content goes inside the body -->
  <main class="page"> <!-- Main content area of the page. The class "page" controls layout and width in CSS. -->
    <h1>Your Basket</h1> <!-- Main heading of the checkout page. -->
    <p>This is a demo page.</p> <!-- Informational paragraph explaining that functionality is not yet implemented. -->

    <p style="margin-top: 12px;"> <!-- Paragraph with inline style adding space above. margin-top creates spacing from the previous element. -->
      <a class="add-btn" href="index.html">Continue shopping</a> <!-- Link styled as a button. Takes the user back to the main shopping page. -->
    </p>
  </main>
</body>
</html>
